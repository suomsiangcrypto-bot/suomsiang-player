name: Build SUOMSIANG EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Create Electron Main Script
      run: |
        # สร้างไฟล์คุมหน้าต่างเบื้องต้นสำหรับ Electron
        echo "const { app, BrowserWindow } = require('electron');" > main.js
        echo "app.whenReady().then(() => {" >> main.js
        echo "  const win = new BrowserWindow({ width: 1040, height: 640, frame: false, resizable: false, webPreferences: { nodeIntegration: true } });" >> main.js
        echo "  win.loadFile('index.html');" >> main.js
        echo "});" >> main.js

    - name: Compile and Package to EXE
      run: |
        # ใช้ npx เรียกใช้เครื่องมือของ electron ได้โดยตรงแบบไม่ติดปัญหา Path
        npx electron-packager . suomsiang-player --platform=win32 --arch=x64 --overwrite --out=./build_output
        powershell Compress-Archive -Path ./build_output/* -DestinationPath ./suomsiang-player-win64.zip

    - name: Upload Final EXE Package to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: SUOMSIANG-PLAYER-EXE
        path: suomsiang-player-win64.zip
