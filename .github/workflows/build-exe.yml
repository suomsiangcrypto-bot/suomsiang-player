name: Build SUOMSIANG EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Download NW.js Runtime
      run: |
        curl -L https://dl.nwjs.io/v0.82.0/nwjs-v0.82.0-win-x64.zip -o nwjs.zip
        powershell Expand-Archive -Path nwjs.zip -DestinationPath .
        mv nwjs-v0.82.0-win-x64 nwjs_runtime

    - name: Create Executable Package
      run: |
        # เปลี่ยนวิธีแพ็คไฟล์ โดยการ zip เฉพาะเนื้อหาด้านใน ไม่เอาตัวโฟลเดอร์หลักไปซ้อน
        powershell "Get-ChildItem -Path index.html, package.json, favicon.ico | Compress-Archive -DestinationPath ./app.nw"
        
        # ผสมผสานแอปเข้ากับตัวรันเพื่อสร้างไฟล์แอปเดี่ยว
        cmd /c "copy /b nwjs_runtime\nw.exe + app.nw nwjs_runtime\SUOMSIANG-CAPCUT.exe"
        
        # ลบไฟล์ตัวดั้งเดิมออกเพื่อไม่ให้สับสน
        rm nwjs_runtime/nw.exe
        
        # คัดแยกเฉพาะไฟล์ที่จำเป็นลงโฟลเดอร์ ZIP ส่งออก
        mkdir dist_zip
        mv nwjs_runtime/* dist_zip/
        powershell Compress-Archive -Path ./dist_zip/* -DestinationPath ./suomsiang-player-win64.zip

    - name: Upload Final EXE Package to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: SUOMSIANG-PLAYER-EXE
        path: suomsiang-player-win64.zip
