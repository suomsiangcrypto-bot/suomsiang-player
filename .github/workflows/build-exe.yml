name: Build SUOMSIANG EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 16 # ปรับเวอร์ชัน Node เพื่อรองรับ nw-builder ตัวเสถียร

    - name: Install NW-Builder tool
      run: npm install -g nw-builder@3.15.0 # ระบุเวอร์ชันที่เสถียรสำหรับการแพ็ค Single HTML

    - name: Compile and Package to EXE
      run: |
        mkdir build_output
        # ทำการส่งรหัสคอมไพล์โดยระบุตำแหน่งโฟลเดอร์ปัจจุบันอย่างชัดเจน
        nwbuild --platforms win64 --flavor normal --output ./build_output/ .
        powershell Compress-Archive -Path ./build_output/* -DestinationPath ./suomsiang-player-win64.zip

    - name: Upload Final EXE Package to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: SUOMSIANG-PLAYER-EXE
        path: suomsiang-player-win64.zip
