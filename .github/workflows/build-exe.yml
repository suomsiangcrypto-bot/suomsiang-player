name: Build SUOMSIANG EXE

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Compile and Package to EXE
      run: |
        # เรียกใช้เครื่องมือสากลผ่าน npx เพื่อสร้างหน้าต่างแบบแอปพลิเคชัน Frameless
        npx nativefier --name "SUOMSIANG-CAPCUT" --width 1040 --height 640 --disable-context-menu --internal-urls ".*" . ./build_output
        
        # ค้นหาและบีบอัดโฟลเดอร์ผลลัพธ์ที่สร้างได้เป็นไฟล์ ZIP
        powershell Compress-Archive -Path ./build_output/* -DestinationPath ./suomsiang-player-win64.zip

    - name: Upload Final EXE Package to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: SUOMSIANG-PLAYER-EXE
        path: suomsiang-player-win64.zip
